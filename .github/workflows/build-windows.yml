name: Build Windows Prototype

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level high
      - run: pnpm dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: echoverse-windows-portable
          path: |
            release/*.exe
            release/*.sha256
          if-no-files-found: error
          retention-days: 14
